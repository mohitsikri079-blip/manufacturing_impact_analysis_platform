services:
  neo4j:
    image: neo4j:5.25-community
    container_name: miae-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j-data:/data

  impact-engine:
    build: .
    container_name: miae-impact-engine
    depends_on:
      - neo4j
    ports:
      - "8080:8080"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: password
      MIAE_API_KEY: dev-api-key
      MIAE_API_KEY_ENABLED: "true"

volumes:
  neo4j-data:
